[phases.setup]
nixPkgs = ["nodejs"]

[phases.install]
cmds = ["cd backend && npm install", "cd frontend && npm install"]

[phases.build]
cmds = [
  "cd backend && npm run db:generate",
  "cd backend && npm run build",
  "cd frontend && VITE_API_BASE_URL=/api npm run build"
]

[start]
cmd = "cd backend && npm start"
